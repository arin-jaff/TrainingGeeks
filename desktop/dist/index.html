<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TrainingGeeks</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: #0f1b33; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap { text-align: center; }
  .mark { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .mark b { color: #2f6fed; }
  .sub { margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.55); }
  .bar {
    margin: 22px auto 0; width: 160px; height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.12); overflow: hidden; position: relative;
  }
  .bar::after {
    content: ""; position: absolute; left: -40%; top: 0; height: 100%; width: 40%;
    border-radius: 2px; background: #2f6fed; animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide { to { left: 100%; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">TRAINING<b>GEEKS</b></div>
    <div class="sub">Starting your training server</div>
    <div class="bar"></div>
  </div>
</body>
</html>
