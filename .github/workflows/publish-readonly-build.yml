name: Publish read-only build

# Builds the app from main and publishes a ready-to-run branch, readonly-deploy,
# that contains the source PLUS the prebuilt .next. The Raspberry Pi tracks
# readonly-deploy and just `git pull`s — no on-device build, no rsync.
# Read-only enforcement is a runtime flag (TG_READONLY=1), so the same build
# serves both the public demo and a normal instance.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-readonly-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Publish prebuilt app to readonly-deploy
        run: |
          rm -rf .next/cache          # runtime doesn't need the build cache
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .next            # .next is gitignored; force it into this branch
          git commit -m "build $(git rev-parse --short HEAD)"
          git push -f origin HEAD:readonly-deploy
