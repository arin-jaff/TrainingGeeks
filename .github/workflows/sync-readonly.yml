name: Sync readonly-mode with main

# On every push to main: merge main into the read-only demo branch
# (readonly-mode), then build it and publish the ready-to-run readonly-deploy
# branch (source + prebuilt .next) that the Raspberry Pi pulls. Done in one
# run because a GITHUB_TOKEN push doesn't trigger a second workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readonly-pipeline
  cancel-in-progress: false

jobs:
  merge-build-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge main into readonly-mode
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout readonly-mode
          if git merge --no-edit origin/main; then
            git push origin readonly-mode
          else
            git merge --abort
            echo "::error::Merge conflict between main and readonly-mode — resolve manually."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build

      - name: Publish prebuilt app to readonly-deploy
        run: |
          rm -rf .next/cache          # runtime doesn't need the build cache
          git add -f .next            # .next is gitignored; force it into this branch
          git commit -m "build $(git rev-parse --short HEAD)"
          git push -f origin HEAD:readonly-deploy
